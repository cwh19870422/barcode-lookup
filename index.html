<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>е–¬еӨ§зҷҫиІЁ POS</title>
<style>
  :root{
    --sysfont: -apple-system, BlinkMacSystemFont, "SF Pro Text", "PingFang TC", "Helvetica Neue", Arial, sans-serif;
    --monofont: ui-monospace, "SF Mono", Menlo, Monaco, Consolas, monospace;
    --ink:#1C1C1E; --paper:#F2F2F7; --paper-alt:#EFEFF4;
    --blue:#007AFF; --gray-fill:#E9E9EB; --line:#E5E5EA;
    --red:#FF3B30; --green:#34C759; --secondary:#8E8E93; --card:#FFFFFF;
    --shadow: 0 1px 2px rgba(0,0,0,0.04), 0 2px 10px rgba(0,0,0,0.05);
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{background:var(--paper); color:var(--ink); font-family:var(--sysfont); -webkit-font-smoothing:antialiased; min-height:100vh;}
  .barcode-strip{height:10px; width:100%; background-image: repeating-linear-gradient(90deg,var(--ink) 0px, var(--ink) 2px,transparent 2px, transparent 5px,var(--ink) 5px, var(--ink) 6px,transparent 6px, transparent 10px,var(--ink) 10px, var(--ink) 13px,transparent 13px, transparent 16px); opacity:0.12;}
  header{background:var(--paper); color:var(--ink); padding:22px 24px 14px; position:relative;}
  header .inner{max-width:920px; margin:0 auto; position:relative; z-index:2;}
  .eyebrow{font-family:var(--monofont); font-size:11.5px; letter-spacing:0.08em; text-transform:uppercase; color:var(--secondary); margin:0 0 6px; display:flex; align-items:center; gap:8px;}
  .eyebrow .dot{width:6px;height:6px;background:var(--blue);border-radius:50%;display:inline-block;}
  h1{font-family:var(--sysfont); font-weight:700; font-size:clamp(28px,4.2vw,36px); margin:0 0 4px; letter-spacing:-0.02em; color:var(--ink);}
  .sub{font-size:14px; color:var(--secondary); margin:0; font-family:var(--sysfont);}
  .top-link{position:absolute; top:22px; right:24px; z-index:3; background:var(--gray-fill); border:none; color:var(--blue); font-family:var(--sysfont); font-weight:600; font-size:13px; padding:8px 14px; border-radius:999px; text-decoration:none; display:flex; align-items:center; gap:6px;}
  .top-link:hover{background:#DFDFE4;}
  main{max-width:920px; margin:0 auto; padding:14px 24px 80px;}
  .search-wrap{position:relative; z-index:5;}
  .search-box{background:var(--gray-fill); border:none; border-radius:12px; padding:2px 4px 2px 14px; display:flex; align-items:center; gap:8px;}
  .search-box svg{flex-shrink:0; color:var(--secondary);}
  .search-box input{flex:1; border:none; outline:none; background:transparent; font-size:17px; padding:11px 4px; font-family:var(--sysfont); color:var(--ink);}
  .search-box input::placeholder{color:var(--secondary);}
  .clear-btn{border:none; background:transparent; color:var(--secondary); width:30px;height:30px; border-radius:50%; cursor:pointer; font-size:14px; display:flex;align-items:center;justify-content:center; flex-shrink:0; transition:background .15s;}
  .clear-btn:hover{background:#DFDFE4;}
  .chips{display:flex; gap:8px; flex-wrap:wrap; margin:16px 0 4px;}
  .chip{font-family:var(--sysfont); font-weight:500; font-size:13px; padding:7px 14px; border-radius:999px; border:none; background:var(--gray-fill); color:var(--ink); cursor:pointer; transition:all .15s; white-space:nowrap;}
  .chip:hover{background:#DFDFE4;}
  .chip.active{background:var(--blue); color:#fff;}
  .status-row{display:flex; justify-content:space-between; align-items:baseline; margin:20px 0 10px; font-family:var(--sysfont); font-size:13px; color:var(--secondary);}
  .status-row b{color:var(--ink); font-weight:600;}
  .results{display:flex; flex-direction:column; gap:10px;}
  .card{background:var(--card); border:none; border-radius:14px; padding:16px 18px; box-shadow:var(--shadow);}
  .card-top{display:flex; justify-content:space-between; align-items:flex-start; gap:12px; margin-bottom:10px;}
  .name{font-size:16.5px; font-weight:600; line-height:1.4; font-family:var(--sysfont);}
  .name mark{background:rgba(0,122,255,0.16); color:var(--ink); border-radius:3px; padding:0 1px;}
  .tag{font-family:var(--sysfont); font-weight:600; font-size:11.5px; color:var(--blue); background:rgba(0,122,255,0.1); padding:3px 10px; border-radius:999px; white-space:nowrap; flex-shrink:0;}
  .meta-row{display:flex; gap:14px; flex-wrap:wrap; font-family:var(--sysfont); font-size:12.5px; color:var(--secondary); margin-bottom:12px;}
  .meta-row mark{background:rgba(0,122,255,0.16); color:var(--ink); border-radius:2px;}
  .prices{display:grid; grid-template-columns:repeat(4,1fr); gap:8px;}
  .price-cell{display:flex; align-items:stretch; border-radius:12px; overflow:hidden;}
  .price-cell .lbl{background:var(--paper-alt); color:#6B6B6F; font-family:var(--sysfont); font-weight:600; font-size:13px; display:flex; align-items:center; justify-content:center; padding:0 9px; flex-shrink:0;}
  .price-cell .val{background:var(--paper-alt); font-family:var(--sysfont); font-size:19px; font-weight:800; color:var(--ink); letter-spacing:-0.01em; flex:1; display:flex; align-items:center; justify-content:center; padding:9px 4px; text-align:center;}
  .price-cell.cost .val{color:var(--red);}
  .price-cell.sell .val{color:var(--blue);}
  .empty{text-align:center; padding:70px 20px; color:var(--secondary);}
  .empty .big{font-family:var(--monofont); font-size:12.5px; letter-spacing:0.08em; text-transform:uppercase; margin-bottom:8px; color:var(--secondary);}
  .empty .msg{font-size:15px; font-family:var(--sysfont);}
  footer{max-width:920px; margin:30px auto 0; padding:14px 24px 0; border-top:1px solid var(--line); font-family:var(--sysfont); font-size:11.5px; color:var(--secondary); display:flex; justify-content:space-between; flex-wrap:wrap; gap:6px;}
  @media (max-width:520px){.prices{grid-template-columns:repeat(2,1fr);} header{padding:20px 16px 12px;} main{padding:12px 16px 60px;} .price-cell .val{font-size:17px;}}
  ::selection{background:rgba(0,122,255,0.25);}
</style>
</head>
<body>

<header>
  <div class="inner">
    <p class="eyebrow"><span class="dot"></span>BARCODE DATABASE</p>
    <h1>е–¬еӨ§зҷҫиІЁ POS</h1>
    <p class="sub" id="headerStats">ијүе…ҘдёӯвҖҰ</p>
  </div>
  <a class="top-link" href="./update.html">вҡҷ жӣҙж–°иіҮж–ҷ</a>
</header>
<div class="barcode-strip"></div>

<main>
  <div class="search-wrap">
    <div class="search-box">
      <svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input id="searchInput" type="text" placeholder="ијёе…Ҙе•Ҷе“ҒеҗҚзЁұгҖҒжўқзўјжҲ–е•Ҷе“Ғз·ЁиҷҹвҖҰ" autocomplete="off" autofocus>
      <button class="clear-btn" id="clearBtn" title="жё…йҷӨ">вң•</button>
    </div>
  </div>

  <div class="chips" id="chips"></div>

  <div class="status-row">
    <span id="statusText">ијүе…ҘдёӯвҖҰ</span>
    <span id="dataDate"></span>
  </div>

  <div class="results" id="results"></div>
</main>

<footer>
  <span>иіҮж–ҷдҫҶжәҗпјҡdata.jsonпјҲеҸҜж–јгҖҢжӣҙж–°иіҮж–ҷгҖҚй ҒйқўйҮҚж–°з”ўз”ҹпјү</span>
  <span>жң¬=AVERAGECOST(жң¬йҢў) В· иіЈ=priceA(е”®еғ№) В· 3=priceC В· 4=priceD</span>
</footer>

<script>
let cats = [];
let rows = [];

const chipsEl = document.getElementById('chips');
const resultsEl = document.getElementById('results');
const statusEl = document.getElementById('statusText');
const input = document.getElementById('searchInput');
const clearBtn = document.getElementById('clearBtn');
let activeCat = null;
let debounceTimer = null;

async function init(){
  try{
    const res = await fetch('./data.json?_=' + Date.now());
    if(!res.ok) throw new Error('HTTP ' + res.status);
    const data = await res.json();
    cats = data.cats || [];
    rows = data.rows || [];
    document.getElementById('headerStats').textContent =
      rows.length.toLocaleString() + ' зӯҶе•Ҷе“Ғ В· ' + cats.length + ' еҖӢеҲҶйЎһ';
    statusEl.textContent = 'и«Ӣијёе…Ҙй—ңйҚөеӯ—й–Ӣе§Ӣжҗңе°Ӣ';
  }catch(e){
    statusEl.textContent = 'вҡ  з„Ўжі•ијүе…Ҙ data.jsonпјҲ' + e.message + 'пјү';
    document.getElementById('headerStats').textContent = 'иіҮж–ҷијүе…ҘеӨұж•—';
  }
  renderChips();
}

function renderChips(){
  let html = `<button class="chip${activeCat===null?' active':''}" data-cat="all">е…ЁйғЁ</button>`;
  cats.forEach((c,i)=>{
    html += `<button class="chip${activeCat===i?' active':''}" data-cat="${i}">${escapeHtml(c)}</button>`;
  });
  chipsEl.innerHTML = html;
  chipsEl.querySelectorAll('.chip').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      const v = btn.getAttribute('data-cat');
      activeCat = (v==='all') ? null : parseInt(v,10);
      renderChips();
      doSearch();
    });
  });
}

function escapeHtml(s){
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
function highlight(text, q){
  if(!q) return escapeHtml(text);
  const esc = escapeHtml(text);
  const escQ = escapeHtml(q);
  try{
    const re = new RegExp('('+escQ.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+')','ig');
    return esc.replace(re, '<mark>$1</mark>');
  }catch(e){ return esc; }
}
function fmt(n){
  if(n===null || n===undefined || n==='' || (typeof n==='number' && isNaN(n))) return 'вҖ”';
  const num = Number(n);
  if(isNaN(num)) return 'вҖ”';
  return num.toLocaleString('en-US', {maximumFractionDigits:0});
}

function doSearch(){
  const q = input.value.trim();
  clearBtn.style.visibility = q ? 'visible' : 'hidden';

  if(!q && activeCat===null){
    statusEl.textContent = 'и«Ӣијёе…Ҙй—ңйҚөеӯ—й–Ӣе§Ӣжҗңе°Ӣ';
    resultsEl.innerHTML = '';
    return;
  }

  const qLower = q.toLowerCase();
  let matches = [];
  for(let i=0;i<rows.length;i++){
    const r = rows[i];
    if(activeCat!==null && r[0]!==activeCat) continue;
    if(q){
      const name = r[4] || '', barcode = r[3] || '', code = r[2] || '', note = r[1] || '';
      if(!(name.toLowerCase().includes(qLower) || barcode.includes(q) || code.toLowerCase().includes(qLower) || note.toLowerCase().includes(qLower))) continue;
    }
    matches.push(r);
    if(matches.length >= 300) break;
  }

  const total = matches.length;
  statusEl.innerHTML = `жүҫеҲ° <b>${total}${total>=300?'+':''}</b> зӯҶзөҗжһң`;

  if(total===0){
    resultsEl.innerHTML = `<div class="empty"><div class="big">NO MATCH</div><div class="msg">жІ’жңүжүҫеҲ°з¬ҰеҗҲгҖҢ${escapeHtml(q)}гҖҚзҡ„е•Ҷе“ҒпјҢжҸӣеҖӢй—ңйҚөеӯ—и©Ұи©Ұпјҹ</div></div>`;
    return;
  }

  let html = '';
  for(const r of matches){
    const [catIdx, note, code, barcode, name, cost, priceA, priceC, priceD] = r;
    html += `
    <div class="card">
      <div class="card-top">
        <div class="name">${highlight(name, q)}</div>
        <div class="tag">${escapeHtml(cats[catIdx] ?? '')}</div>
      </div>
      <div class="meta-row">
        <span>жўқзўј ${highlight(barcode||'вҖ”', q)}</span>
        <span>з·Ёиҷҹ ${highlight(code||'вҖ”', q)}</span>
        ${note ? `<span>еӮҷиЁ» ${highlight(note, q)}</span>` : ''}
      </div>
      <div class="prices">
        <div class="price-cell cost"><div class="lbl">жң¬</div><div class="val">${fmt(cost)}</div></div>
        <div class="price-cell"><div class="lbl">4</div><div class="val">${fmt(priceD)}</div></div>
        <div class="price-cell"><div class="lbl">3</div><div class="val">${fmt(priceC)}</div></div>
        <div class="price-cell sell"><div class="lbl">иіЈ</div><div class="val">${fmt(priceA)}</div></div>
      </div>
    </div>`;
  }
  resultsEl.innerHTML = html;
}

input.addEventListener('input', ()=>{
  clearTimeout(debounceTimer);
  debounceTimer = setTimeout(doSearch, 90);
});
clearBtn.addEventListener('click', ()=>{ input.value=''; doSearch(); input.focus(); });
clearBtn.style.visibility = 'hidden';

init();
</script>
</body>
</html>
